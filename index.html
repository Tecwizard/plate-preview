<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plate Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1217;
      --surface:    #1a222e;
      --surface2:   #222c3a;
      --border:     #2d3c50;
      --accent:     #62a4ff;
      --accent-dim: rgba(98, 164, 255, 0.15);
      --muted:      #6f84a0;
      --warn:       #ff6584;
      --text:       #e8e8f4;
      --radius:     12px;
      --sidebar-w:  300px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    header h1 span { color: var(--accent); }

    /* ── Main ────────────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 1.25rem 1rem;
      overflow-y: auto;
    }

    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    /* Input */
    .plate-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--accent);
    }

    .plate-input::placeholder { color: var(--muted); letter-spacing: 0.12em; }
    .plate-input:focus { border-color: var(--accent); }

    .input-help {
      margin-top: 0.45rem;
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .char-count {
      margin-top: 0.3rem;
      font-size: 0.76rem;
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .char-count.warn { color: var(--warn); }

    /* Gallery */
    .plate-gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .plate-card {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0.45rem 0.45rem 0.4rem;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .plate-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .plate-card.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .plate-card canvas {
      width: 100%;
      height: auto;
      border-radius: 6px;
      display: block;
    }

    .plate-card-name {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
    }

    .plate-card.active .plate-card-name { color: var(--accent); }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 0.9rem;
    }

    .toggle-info { line-height: 1.35; }

    .toggle-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .toggle-sub {
      font-size: 0.73rem;
      color: var(--muted);
    }

    /* Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 26px;
      transition: background 0.25s;
      cursor: pointer;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      bottom: 4px;
      left: 4px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }

    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(22px); }
    .switch input:focus-visible + .slider { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Preview area ────────────────────────────────────────── */
    .preview-area {
      flex: 1;
      min-width: 0;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    .preview-area::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, rgba(108,99,255,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 1;
    }

    #three-mount {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #three-mount canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .view-2d {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .view-2d.visible {
      display: flex;
    }

    #canvas-2d {
      max-width: min(600px, 90%);
      height: auto;
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .mode-badge {
      position: absolute;
      top: 0.9rem;
      right: 0.9rem;
      z-index: 20;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.3rem 0.65rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      pointer-events: none;
    }

    .hint-3d {
      position: absolute;
      bottom: 1.1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.4s;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 680px) {
      .main { flex-direction: column; overflow: visible; }
      .sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border);
        gap: 1.1rem;
      }
      .preview-area { min-height: 320px; flex: none; height: 55vw; max-height: 480px; }
    }
  </style>
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
    <rect x="1" y="7" width="24" height="13" rx="3" fill="#6c63ff"/>
    <rect x="3" y="9" width="20" height="9" rx="2" fill="#0f0f17" opacity="0.55"/>
    <circle cx="4.5" cy="13.5" r="1.4" fill="#6c63ff"/>
    <circle cx="21.5" cy="13.5" r="1.4" fill="#6c63ff"/>
  </svg>
  <h1>Plate <span>Preview</span></h1>
</header>

<div class="main">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" aria-label="Controls">

    <div>
      <div class="section-title">Plate Text</div>
      <input
        id="plate-input"
        class="plate-input"
        type="text"
        maxlength="8"
        placeholder="ABC 123"
        autocomplete="off"
        spellcheck="false"
        aria-label="License plate text"
      />
      <p class="input-help">Letters A–Z, digits 0–9 and spaces only.</p>
      <div class="char-count" id="char-count" aria-live="polite">0 / 8</div>
    </div>

    <div>
      <div class="section-title">Plate Style</div>
      <div class="plate-gallery" id="plate-gallery" role="listbox" aria-label="Plate style"></div>
    </div>

    <div>
      <div class="section-title">View Mode</div>
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label" id="toggle-label">3D View</div>
          <div class="toggle-sub" id="toggle-sub">Drag to rotate, Scroll to zoom</div>
        </div>
        <label class="switch" aria-label="Toggle 3D mode">
          <input type="checkbox" id="view-toggle" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row" id="format-bypass-row" style="margin-top: 0.6rem;">
        <div class="toggle-info">
          <div class="toggle-label">Vanity Plate Mode</div>
          <div class="toggle-sub">Ignore mask and allow full 8 chars</div>
        </div>
        <label class="switch" aria-label="Toggle format bypass">
          <input type="checkbox" id="format-bypass-toggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

  </aside>

  <!-- ── Preview ── -->
  <main class="preview-area" id="preview-area" aria-label="Plate preview">
    <div id="three-mount" aria-hidden="true"></div>
    <div class="view-2d" id="view-2d">
      <canvas id="canvas-2d" width="800" height="400" aria-label="2D plate preview"></canvas>
    </div>
    <div class="mode-badge" id="mode-badge">3D</div>
    <div class="hint-3d" id="hint-3d">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
  </main>

</div>

<!-- Three.js via import map -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="./app.js"></script>
</body>
</html>
