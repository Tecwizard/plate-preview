<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plate Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f17;
      --surface:    #1a1a2e;
      --surface2:   #23233a;
      --border:     #2e2e50;
      --accent:     #6c63ff;
      --accent-dim: rgba(108,99,255,0.15);
      --warn:       #ff6584;
      --text:       #e8e8f4;
      --muted:      #7070a0;
      --radius:     12px;
      --sidebar-w:  300px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    header h1 span { color: var(--accent); }

    /* ── Main ────────────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 1.25rem 1rem;
      overflow-y: auto;
    }

    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    /* Input */
    .plate-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--accent);
    }

    .plate-input::placeholder { color: var(--muted); letter-spacing: 0.12em; }
    .plate-input:focus { border-color: var(--accent); }

    .input-help {
      margin-top: 0.45rem;
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .char-count {
      margin-top: 0.3rem;
      font-size: 0.76rem;
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .char-count.warn { color: var(--warn); }

    /* Gallery */
    .plate-gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .plate-card {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0.45rem 0.45rem 0.4rem;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .plate-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .plate-card.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .plate-card canvas {
      width: 100%;
      height: auto;
      border-radius: 6px;
      display: block;
    }

    .plate-card-name {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
    }

    .plate-card.active .plate-card-name { color: var(--accent); }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 0.9rem;
    }

    .toggle-info { line-height: 1.35; }

    .toggle-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .toggle-sub {
      font-size: 0.73rem;
      color: var(--muted);
    }

    /* Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 26px;
      transition: background 0.25s;
      cursor: pointer;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      bottom: 4px;
      left: 4px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }

    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(22px); }
    .switch input:focus-visible + .slider { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Preview area ────────────────────────────────────────── */
    .preview-area {
      flex: 1;
      min-width: 0;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    .preview-area::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, rgba(108,99,255,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 1;
    }

    #three-mount {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #three-mount canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .view-2d {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .view-2d.visible {
      display: flex;
    }

    #canvas-2d {
      max-width: min(600px, 90%);
      height: auto;
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .mode-badge {
      position: absolute;
      top: 0.9rem;
      right: 0.9rem;
      z-index: 20;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.3rem 0.65rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      pointer-events: none;
    }

    .hint-3d {
      position: absolute;
      bottom: 1.1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.4s;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 680px) {
      .main { flex-direction: column; overflow: visible; }
      .sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border);
        gap: 1.1rem;
      }
      .preview-area { min-height: 320px; flex: none; height: 55vw; max-height: 480px; }
    }
  </style>
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
    <rect x="1" y="7" width="24" height="13" rx="3" fill="#6c63ff"/>
    <rect x="3" y="9" width="20" height="9" rx="2" fill="#0f0f17" opacity="0.55"/>
    <circle cx="4.5" cy="13.5" r="1.4" fill="#6c63ff"/>
    <circle cx="21.5" cy="13.5" r="1.4" fill="#6c63ff"/>
  </svg>
  <h1>Plate <span>Preview</span></h1>
</header>

<div class="main">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" aria-label="Controls">

    <div>
      <div class="section-title">Plate Text</div>
      <input
        id="plate-input"
        class="plate-input"
        type="text"
        maxlength="8"
        placeholder="ABC 123"
        autocomplete="off"
        spellcheck="false"
        aria-label="License plate text"
      />
      <p class="input-help">Letters A–Z, digits 0–9 and spaces only &nbsp;·&nbsp; max&nbsp;8&nbsp;characters</p>
      <div class="char-count" id="char-count" aria-live="polite">0 / 8</div>
    </div>

    <div>
      <div class="section-title">Plate Style</div>
      <div class="plate-gallery" id="plate-gallery" role="listbox" aria-label="Plate style"></div>
    </div>

    <div>
      <div class="section-title">View Mode</div>
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label" id="toggle-label">3D View</div>
          <div class="toggle-sub" id="toggle-sub">Drag to rotate</div>
        </div>
        <label class="switch" aria-label="Toggle 2D mode">
          <input type="checkbox" id="view-toggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

  </aside>

  <!-- ── Preview ── -->
  <main class="preview-area" id="preview-area" aria-label="Plate preview">
    <div id="three-mount" aria-hidden="true"></div>
    <div class="view-2d" id="view-2d">
      <canvas id="canvas-2d" width="800" height="200" aria-label="2D plate preview"></canvas>
    </div>
    <div class="mode-badge" id="mode-badge">3D</div>
    <div class="hint-3d" id="hint-3d">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
  </main>

</div>

<!-- Three.js via import map -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ================================================================
   PLATE TYPE DEFINITIONS
   Each type exposes a draw(ctx, text, w, h) method that renders
   the plate onto any 2d canvas context at (0,0,w,h).
   ================================================================ */

const PLATE_TYPES = [
  /* ----------------------------------------------------------
     Standard — white/black, classic American look
  ---------------------------------------------------------- */
  {
    id: 'standard',
    name: 'Standard',
    draw(ctx, text, w, h) {
      const pad = h * 0.055;

      // Background
      ctx.fillStyle = '#f4f4ee';
      rrFill(ctx, 0, 0, w, h, h * 0.09);

      // Outer border
      ctx.strokeStyle = '#333';
      ctx.lineWidth = h * 0.045;
      rrStroke(ctx, pad, pad, w - pad * 2, h - pad * 2, h * 0.07);

      // Bolt holes
      bolts(ctx, w, h, '#aaa');

      // Plate number
      plateText(ctx, text, w, h * 0.56, '#111',
        h * 0.48, "700 1em 'Arial Black',Arial,sans-serif");
    }
  },

  /* ----------------------------------------------------------
     California — deep blue with gold accents
  ---------------------------------------------------------- */
  {
    id: 'california',
    name: 'California',
    draw(ctx, text, w, h) {
      const pad = h * 0.055;

      // Sky gradient background
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, '#1b3f7c');
      g.addColorStop(1, '#0d2350');
      ctx.fillStyle = g;
      rrFill(ctx, 0, 0, w, h, h * 0.09);

      // Gold border
      ctx.strokeStyle = '#e8b923';
      ctx.lineWidth = h * 0.055;
      rrStroke(ctx, pad, pad, w - pad * 2, h - pad * 2, h * 0.07);

      // State name
      ctx.fillStyle = '#e8b923';
      ctx.font = `bold ${h * 0.17}px 'Arial Narrow',Arial,sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('CALIFORNIA', w / 2, h * 0.3);

      // Bolt holes
      bolts(ctx, w, h, '#e8b923');

      // Plate number (shifted down slightly due to state text)
      plateText(ctx, text, w, h * 0.64, '#ffd534',
        h * 0.44, "700 1em 'Arial Black',Arial,sans-serif");
    }
  },

  /* ----------------------------------------------------------
     Classic — near-black with chrome/silver text
  ---------------------------------------------------------- */
  {
    id: 'classic',
    name: 'Classic',
    draw(ctx, text, w, h) {
      const pad = h * 0.055;

      // Dark background
      ctx.fillStyle = '#1a1a1a';
      rrFill(ctx, 0, 0, w, h, h * 0.09);

      // Chrome gradient border
      const cg = ctx.createLinearGradient(0, 0, 0, h);
      cg.addColorStop(0,   '#c8c8c8');
      cg.addColorStop(0.5, '#707070');
      cg.addColorStop(1,   '#c8c8c8');
      ctx.strokeStyle = cg;
      ctx.lineWidth = h * 0.05;
      rrStroke(ctx, pad, pad, w - pad * 2, h - pad * 2, h * 0.07);

      // Inner subtle highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      rrStroke(ctx, pad * 2, pad * 2, w - pad * 4, h - pad * 4, h * 0.055);

      // Bolt holes
      bolts(ctx, w, h, '#888');

      // Plate number — metallic silver
      plateText(ctx, text, w, h * 0.56, '#e0e0e0',
        h * 0.48, "700 1em 'Arial Black',Arial,sans-serif");
    }
  },

  /* ----------------------------------------------------------
     Vintage — cream / aged paper with red serif styling
  ---------------------------------------------------------- */
  {
    id: 'vintage',
    name: 'Vintage',
    draw(ctx, text, w, h) {
      const pad = h * 0.055;

      // Aged cream background
      ctx.fillStyle = '#f0e8c8';
      rrFill(ctx, 0, 0, w, h, h * 0.09);

      // Subtle texture lines
      ctx.strokeStyle = 'rgba(180,150,80,0.15)';
      ctx.lineWidth = 1;
      for (let y = 8; y < h; y += 8) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }

      // Red outer border (thick)
      ctx.strokeStyle = '#b82c20';
      ctx.lineWidth = h * 0.065;
      rrStroke(ctx, pad, pad, w - pad * 2, h - pad * 2, h * 0.07);

      // Red inner border (thin)
      ctx.strokeStyle = '#c43828';
      ctx.lineWidth = h * 0.022;
      rrStroke(ctx, pad * 2.2, pad * 2.2, w - pad * 4.4, h - pad * 4.4, h * 0.05);

      // State header text
      ctx.fillStyle = '#8b1e16';
      ctx.font = `bold ${h * 0.155}px Georgia,'Times New Roman',serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('· VINTAGE ·', w / 2, h * 0.295);

      // Bolt holes
      bolts(ctx, w, h, '#b82c20');

      // Plate number — dark red serif
      plateText(ctx, text, w, h * 0.65, '#3a1008',
        h * 0.43, "700 1em Georgia,'Times New Roman',serif");
    }
  },
];

/* ================================================================
   CANVAS DRAWING HELPERS
   ================================================================ */

/** Filled rounded rectangle */
function rrFill(ctx, x, y, w, h, r) {
  rr(ctx, x, y, w, h, Math.min(r, w / 2, h / 2));
  ctx.fill();
}

/** Stroked rounded rectangle */
function rrStroke(ctx, x, y, w, h, r) {
  rr(ctx, x, y, w, h, Math.min(r, w / 2, h / 2));
  ctx.stroke();
}

/** Build rounded-rect path */
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

/** Draw bolt holes on left and right */
function bolts(ctx, w, h, color) {
  const r  = h * 0.048;
  const cx = [h * 0.135, w - h * 0.135];
  const cy = h / 2;
  cx.forEach(x => {
    ctx.beginPath();
    ctx.arc(x, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#666';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Phillips screw cross
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x - r * 0.55, cy); ctx.lineTo(x + r * 0.55, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, cy - r * 0.55); ctx.lineTo(x, cy + r * 0.55); ctx.stroke();
  });
}

/**
 * Draw the plate number centered at (w/2, centerY).
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} text      - plate text (may be empty)
 * @param {number} w         - canvas width
 * @param {number} centerY   - vertical center in px
 * @param {string} color     - fill colour
 * @param {number} maxFontPx - maximum font size in px
 * @param {string} fontSpec  - CSS font spec (weight + family, no size)
 */
function plateText(ctx, text, w, centerY, color, maxFontPx, fontSpec) {
  const display = (text && text.trim()) ? text : 'YOUR PLATE';
  const isEmpty = !(text && text.trim());

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Fit text horizontally
  const maxW = w * 0.78;
  let fontSize = maxFontPx;
  ctx.font = `${fontSize}px ${fontSpec.split(' ').slice(2).join(' ')}`;
  // Re-apply full spec for measurement
  ctx.font = fontSpec.replace('1em', `${fontSize}px`);
  while (ctx.measureText(display).width > maxW && fontSize > 10) {
    fontSize -= 1;
    ctx.font = fontSpec.replace('1em', `${fontSize}px`);
  }

  if (isEmpty) {
    ctx.globalAlpha = 0.35;
  }

  // Subtle drop shadow
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur   = 4;
  ctx.shadowOffsetY = 2;

  ctx.fillStyle = color;
  ctx.fillText(display, w / 2, centerY);

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur   = 0;
  ctx.shadowOffsetY = 0;
  ctx.globalAlpha   = 1;
}

/** Draw a full plate onto any context at (0,0,w,h) */
function drawPlate(ctx, plateType, text, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  plateType.draw(ctx, text, w, h);
  ctx.restore();
}

/* ================================================================
   STATE
   ================================================================ */
let currentText    = '';
let currentPlateId = 'standard';
let is3D           = true;

/* ================================================================
   GALLERY
   ================================================================ */
const galleryEl = document.getElementById('plate-gallery');

function buildGallery() {
  galleryEl.innerHTML = '';
  PLATE_TYPES.forEach(pt => {
    const card = document.createElement('div');
    card.className = 'plate-card' + (pt.id === currentPlateId ? ' active' : '');
    card.setAttribute('role', 'option');
    card.setAttribute('aria-selected', pt.id === currentPlateId ? 'true' : 'false');
    card.dataset.id = pt.id;

    const tnv = document.createElement('canvas');
    tnv.width  = 240;
    tnv.height = 60;
    const tc = tnv.getContext('2d');
    drawPlate(tc, pt, 'SAMPLE', 240, 60);

    const nm = document.createElement('div');
    nm.className = 'plate-card-name';
    nm.textContent = pt.name;

    card.appendChild(tnv);
    card.appendChild(nm);

    card.addEventListener('click', () => {
      currentPlateId = pt.id;
      buildGallery();
      updatePreview();
    });

    galleryEl.appendChild(card);
  });
}

/* ================================================================
   TEXT INPUT
   ================================================================ */
const plateInputEl = document.getElementById('plate-input');
const charCountEl  = document.getElementById('char-count');

plateInputEl.addEventListener('input', () => {
  let v = plateInputEl.value
    .toUpperCase()
    .replace(/[^A-Z0-9 ]/g, '')
    .slice(0, 8);
  plateInputEl.value = v;
  currentText = v;
  charCountEl.textContent = `${v.length} / 8`;
  charCountEl.classList.toggle('warn', v.length >= 7);
  updatePreview();
});

/* ================================================================
   VIEW TOGGLE
   ================================================================ */
const viewToggleEl = document.getElementById('view-toggle');
const toggleLabelEl = document.getElementById('toggle-label');
const toggleSubEl   = document.getElementById('toggle-sub');
const modeBadgeEl   = document.getElementById('mode-badge');
const view2dEl      = document.getElementById('view-2d');
const hint3dEl      = document.getElementById('hint-3d');
const threeMountEl  = document.getElementById('three-mount');

viewToggleEl.addEventListener('change', () => {
  is3D = !viewToggleEl.checked;
  applyViewMode();
  updatePreview();
});

function applyViewMode() {
  modeBadgeEl.textContent = is3D ? '3D' : '2D';
  toggleLabelEl.textContent = is3D ? '3D View' : '2D View';
  toggleSubEl.textContent   = is3D ? 'Drag to rotate' : 'Flat preview';
  threeMountEl.style.display = is3D ? 'block' : 'none';
  view2dEl.classList.toggle('visible', !is3D);
  hint3dEl.style.display = is3D ? 'block' : 'none';
}

/* ================================================================
   2D PREVIEW
   ================================================================ */
const canvas2dEl = document.getElementById('canvas-2d');
const ctx2d      = canvas2dEl.getContext('2d');

function draw2D() {
  const pt = PLATE_TYPES.find(p => p.id === currentPlateId);
  drawPlate(ctx2d, pt, currentText, canvas2dEl.width, canvas2dEl.height);
}

/* ================================================================
   THREE.JS 3D PREVIEW
   ================================================================ */
const previewEl = document.getElementById('preview-area');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f17);
scene.fog = new THREE.FogExp2(0x0f0f17, 0.12);

// Camera
const camera = new THREE.PerspectiveCamera(
  45,
  previewEl.clientWidth / Math.max(previewEl.clientHeight, 1),
  0.1,
  100
);
camera.position.set(0, 0.4, 4.5);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(previewEl.clientWidth, previewEl.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
threeMountEl.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.minDistance     = 2.5;
controls.maxDistance     = 12;
controls.autoRotate      = true;
controls.autoRotateSpeed = 1.8;

controls.addEventListener('start', () => {
  controls.autoRotate = false;
  hint3dEl.style.opacity = '0';
});

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
dirLight.position.set(4, 6, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.35);
fillLight.position.set(-4, -2, 2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x6c63ff, 0.45);
rimLight.position.set(0, 4, -5);
scene.add(rimLight);

// Plate geometry — 4:1 aspect, thin
const plateGeo = new THREE.BoxGeometry(4, 1, 0.1);

// Texture canvas (high-res so text is crisp)
const texCanvas = document.createElement('canvas');
texCanvas.width  = 1024;
texCanvas.height = 256;
const texCtx = texCanvas.getContext('2d');

const plateTexture = new THREE.CanvasTexture(texCanvas);
plateTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

// BoxGeometry face index order: +X, -X, +Y, -Y, +Z (front), -Z (back)
const edge = new THREE.MeshStandardMaterial({
  color: 0x444450, metalness: 0.7, roughness: 0.35
});
const front = new THREE.MeshStandardMaterial({
  map: plateTexture, metalness: 0.15, roughness: 0.5
});
const back = new THREE.MeshStandardMaterial({
  color: 0x222230, metalness: 0.4, roughness: 0.6
});

const plateMesh = new THREE.Mesh(plateGeo, [edge, edge, edge, edge, front, back]);
plateMesh.castShadow = true;
scene.add(plateMesh);

// Reflective floor
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a14, metalness: 0.05, roughness: 0.95
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2;
floor.receiveShadow = true;
scene.add(floor);

// Update the plate texture
function updateTexture() {
  const pt = PLATE_TYPES.find(p => p.id === currentPlateId);
  drawPlate(texCtx, pt, currentText, texCanvas.width, texCanvas.height);
  plateTexture.needsUpdate = true;
}

// Animation loop
let animId;
function animate() {
  animId = requestAnimationFrame(animate);
  if (is3D) {
    controls.update();
    renderer.render(scene, camera);
  }
}
animate();

// Resize handler
function onResize() {
  const w = previewEl.clientWidth;
  const h = Math.max(previewEl.clientHeight, 1);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

/* ================================================================
   UNIFIED UPDATE
   ================================================================ */
function updatePreview() {
  updateTexture();
  if (!is3D) draw2D();
}

/* ================================================================
   INIT
   ================================================================ */
buildGallery();
applyViewMode();
updatePreview();

// Fade the 3D hint after 4 seconds
setTimeout(() => { hint3dEl.style.opacity = '0'; }, 4000);
</script>
</body>
</html>
